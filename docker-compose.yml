services:
  postgres:
    image: postgres:17
    container_name: focusbear-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: focusbear_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: